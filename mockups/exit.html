<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCalc — Exiting</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-bg-dark">

  <div class="phone-frame">
    <div class="exit-screen">

      <!-- Status Bar -->
      <div class="status-bar" style="position:absolute; top:0; left:0; right:0;">
        <span class="time">9:42</span>
        <span style="font-size:12px; font-weight:500; letter-spacing:0.5px; opacity:0.7;">SafeCalc</span>
        <div class="icons">
          <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
        </div>
      </div>

      <!-- Exit animation -->
      <div class="exit-spinner"></div>

      <div class="exit-message">
        <h2>Returning to Calculator…</h2>
        <p>Clearing session data securely</p>
      </div>

      <!-- Mini calculator preview -->
      <div class="mini-calc-preview" style="margin-top: 48px;">
        <div class="mini-calc-display">
          <span>0</span>
        </div>
        <div class="mini-calc-grid">
          <div class="mini-btn">7</div>
          <div class="mini-btn">8</div>
          <div class="mini-btn">9</div>
          <div class="mini-btn op">÷</div>
          <div class="mini-btn">4</div>
          <div class="mini-btn">5</div>
          <div class="mini-btn">6</div>
          <div class="mini-btn op">×</div>
          <div class="mini-btn">1</div>
          <div class="mini-btn">2</div>
          <div class="mini-btn">3</div>
          <div class="mini-btn op">−</div>
          <div class="mini-btn">0</div>
          <div class="mini-btn">.</div>
          <div class="mini-btn">=</div>
          <div class="mini-btn op">+</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Auto-redirect to calculator after animation completes
    setTimeout(() => {
      window.location.href = 'calculator.html';
    }, 5000);
  </script>

</body>
</html>
