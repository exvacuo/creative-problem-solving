<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>SafeCalc — Exiting</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@9.0.3/framework7-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7-icons@5.0.5/css/framework7-icons.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-bg-dark">

  <div class="phone-frame">
    <div class="dynamic-island"></div>

    <div id="app">
      <div class="view view-main">
        <div data-name="exit" class="page no-navbar">
          <div class="page-content" style="background:var(--calc-bg); padding:0;">
            <div class="exit-center" style="min-height:852px;">

              <div class="exit-spinner"></div>

              <div class="exit-message">
                <h2>Returning to Calculator…</h2>
                <p>Clearing session data securely</p>
              </div>

              <div class="mini-calc-preview" style="margin-top:48px;">
                <div class="mini-calc-display"><span>0</span></div>
                <div class="mini-calc-grid">
                  <div class="mini-btn">7</div><div class="mini-btn">8</div><div class="mini-btn">9</div><div class="mini-btn op">÷</div>
                  <div class="mini-btn">4</div><div class="mini-btn">5</div><div class="mini-btn">6</div><div class="mini-btn op">×</div>
                  <div class="mini-btn">1</div><div class="mini-btn">2</div><div class="mini-btn">3</div><div class="mini-btn op">−</div>
                  <div class="mini-btn">0</div><div class="mini-btn">.</div><div class="mini-btn">=</div><div class="mini-btn op">+</div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/framework7@9.0.3/framework7-bundle.min.js"></script>
  <script>
    var app = new Framework7({ el: '#app', name: 'SafeCalc', theme: 'ios' });
    setTimeout(() => { window.location.href = 'calculator.html'; }, 5000);
  </script>
</body>
</html>
