<!DOCTYPE html>
<html style="background:#111113;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Calculator — Resource Finder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@9.0.3/framework7-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7-icons@5.0.5/css/framework7-icons.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-bg-dark">

  <div class="phone-frame">
    <div class="dynamic-island"></div>

    <!-- Global Status Bar -->
    <div class="global-status-bar">
      <span>9:41</span>
      <div class="icons">
        <svg viewBox="0 0 18 12" style="width:16px; margin-right:1px;"><g fill="currentColor"><rect x="1" y="7" width="2.5" height="5" rx="1"/><rect x="5.5" y="4.5" width="2.5" height="7.5" rx="1"/><rect x="10" y="2" width="2.5" height="10" rx="1"/><rect x="14.5" y="0" width="2.5" height="12" rx="1"/></g></svg>
        <svg viewBox="0 0 24 20" style="width:17px; margin-right:4px;"><path fill="currentColor" d="M12 19c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7.66-8.24c-4.23-3.6-11.09-3.6-15.32 0-.38.33-.42.91-.1 1.29.33.38.91.42 1.29.1 3.49-2.96 9.17-2.96 12.66 0 .38.33.95.28 1.29-.1.33-.38.28-.95-.1-1.29zm-3.83 4.09c-2.11-1.8-5.55-1.8-7.66 0-.38.33-.42.9-.1 1.29.33.38.91.42 1.29.1 1.74-1.48 4.59-1.48 6.33 0 .38.33.95.28 1.29-.1.32-.39.28-.96-.1-1.29zm7.66-8.19c-6.34-5.4-16.63-5.4-22.98 0-.38.33-.42.91-.1 1.29.33.38.91.42 1.29.1 5.23-4.45 13.75-4.45 18.98 0 .38.33.95.28 1.29-.1.33-.38.28-.95-.1-1.29z"/></svg>
        <svg viewBox="0 0 25 12" style="width:23px; padding-bottom:1px;"><rect x="1" y="1" width="20" height="10" rx="3.5" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="3" y="3" width="13" height="6" rx="1.5" fill="currentColor"/><path d="M22 4.5h1a1.5 1.5 0 010 3h-1v-3z" fill="currentColor"/></svg>
      </div>
    </div>



    <div id="app">
      <div class="view view-main">
        <div data-name="resource-finder" class="page dark-support">
          
          <div class="navbar">
            <div class="navbar-bg"></div>
            <div class="navbar-inner sliding">
              <div class="left">
                <a href="support.html" class="link external" style="color:var(--safe-primary);">
                  <i class="f7-icons">chevron_left</i>
                  <span>Back</span>
                </a>
              </div>
              <div class="title" style="color:var(--safe-text);">Resources</div>
              <div class="right">
                <a href="homescreen.html" class="link external">
                  <i class="f7-icons" style="color: #ff3b30; font-weight: bold; font-size: 24px;">xmark</i>
                </a>
              </div>
            </div>
          </div>

          <!-- Searchbar -->
          <form class="searchbar">
            <div class="searchbar-inner">
              <div class="searchbar-input-wrap">
                <input type="search" placeholder="Search shelters, legal aid..." />
                <i class="searchbar-icon"></i>
                <span class="input-clear-button"></span>
              </div>
              <span class="searchbar-disable-button">Cancel</span>
            </div>
          </form>

          <div class="page-content" style="background:var(--safe-bg);">
            
            <div class="searchbar-hide-on-search">
              <div class="block-title" style="margin-top:16px; color:var(--safe-text);">Nearby Services</div>
            </div>

            <div class="list media-list inset search-list searchbar-found" style="margin-top:0;">
              <ul id="resource-list">
              </ul>
            </div>
            
            <div class="list simple-list searchbar-not-found" style="display:none;">
              <ul>
                <li style="color:var(--safe-text-dim); justify-content:center;">Nothing found</li>
              </ul>
            </div>

            <div style="height:120px;"></div> <!-- Spacer for FAB -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/framework7@9.0.3/framework7-bundle.min.js"></script>
  <script>
    var app = new Framework7({ el: '#app', name: 'Calculator', theme: 'ios', dark: true });

    const resources = [
        { name: "Wender Women's Shelter", location: "Groningen, NL", desc: "Emergency accommodation and outpatient support for individuals and families dealing with domestic violence.", details: "Wender provides safe shelter, housing assistance, and outpatient support. Services include crisis relief and counselling referrals.\n\nHotline: 088 066 3000 (24/7)" },
        { name: "Slachtofferhulp Nederland", location: "Groningen, NL", desc: "Emotional and legal support to victims of domestic violence and other crimes.", details: "Provides help with emotional processing, navigating criminal proceedings, and claiming damages. Confidential advice.\n\nPhone: 0900-0101" },
        { name: "Veilig Thuis Groningen", location: "Regional (Groningen)", desc: "Regional advice and reporting center for domestic violence and child abuse.", details: "All calls are free, confidential, and will not appear on your itemised phone bill. Trained advisors available 24 hours to guide you to appropriate local services.\n\nPhone: 0800 2000 (24/7, free)" },
    ];

    const icons = ['house_fill', 'building_2_fill', 'phone_fill'];
    const colors = ['#3b82f6', '#8b5cf6', '#10b981'];
    const bgColors = ['rgba(59,130,246,0.2)', 'rgba(139,92,246,0.2)', 'rgba(16,185,129,0.2)'];

    const ul = document.getElementById('resource-list');
    if (ul) {
      resources.forEach((r, i) => {
        const icon = icons[i % icons.length];
        const color = colors[i % colors.length];
        const bgColor = bgColors[i % bgColors.length];
        
        ul.innerHTML += `
          <li>
            <a href="#" class="item-link item-content" onclick="openResourceModal(${i})">
              <div class="item-media">
                <div style="width:40px; height:40px; border-radius:8px; background:${bgColor}; display:flex; align-items:center; justify-content:center;">
                  <i class="f7-icons" style="font-size:20px; color:${color};">${icon}</i>
                </div>
              </div>
              <div class="item-inner">
                <div class="item-title-row">
                  <div class="item-title" style="color:var(--safe-text); font-weight:600;">${r.name}</div>
                  <div class="item-after" style="color:var(--safe-accent); font-size:14px;">${r.location}</div>
                </div>
                <div class="item-text" style="color:var(--safe-text-dim); height:auto;">${r.desc}</div>
              </div>
            </a>
          </li>`;
      });
    }

    function openResourceModal(i) {
      const r = resources[i];
      const popupHTML = `
        <div class="popup" style="background:var(--safe-surface);">
          <div class="page dark-support">
            <div class="navbar">
              <div class="navbar-bg"></div>
              <div class="navbar-inner">
                <div class="left"><a href="#" class="link popup-close" style="color:var(--safe-primary);">Close</a></div>
                <div class="title" style="color:var(--safe-text);">${r.name}</div>
                <div class="right">
                  <a href="homescreen.html" class="link external">
                    <i class="f7-icons" style="color: #ff3b30; font-weight: bold; font-size: 24px;">xmark</i>
                  </a>
                </div>
              </div>
            </div>
            <div class="page-content" style="padding: 24px; padding-top: calc(44px + var(--f7-safe-area-top) + 24px); color:var(--safe-text);">
              <h3 style="margin-top:0; color:var(--safe-primary);">${r.location}</h3>
              <p style="white-space: pre-line; line-height: 1.6; color:var(--safe-text-dim);">${r.details}</p>
            </div>
          </div>
        </div>`;
      app.popup.create({ content: popupHTML, swipeToClose: true }).open();
    }

    // Initialize F7 Searchbar
    var searchbar = app.searchbar.create({
      el: '.searchbar',
      searchContainer: '.search-list',
      searchIn: '.item-title, .item-text',
    });
  </script>
  <script src="../js/app.js"></script>

    <!-- ===== SWITCH TO WEB PROMO ===== -->
    <a href="../index.html" class="external" style="position: fixed; bottom: 24px; right: 24px; z-index: 100000; background: #1c1c1e; color: #fff; padding: 12px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; display: flex; align-items: center; gap: 8px; font-family: -apple-system, sans-serif; text-decoration: none;">
      <svg xmlns="http://www.w3.org/2000/svg" style="width:20px; height:20px; color: #ff9f0a;" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>
      <span style="font-size:14px; font-weight:600;">View Web Promo</span>
    </a>

</body>
</html>
