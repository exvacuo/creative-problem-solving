<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCalc — Calculator</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-bg-dark">

  <div class="phone-frame">
    <div class="calc-screen">

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="time">9:41</span>
        <span style="font-size:12px; font-weight:500; letter-spacing:0.5px; opacity:0.7;">SafeCalc</span>
        <div class="icons">
          <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
        </div>
      </div>

      <!-- Display -->
      <div class="calc-display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <!-- Scientific Row -->
      <div class="calc-sci-row">
        <button class="calc-sci-btn" data-val="sin(">sin</button>
        <button class="calc-sci-btn" data-val="cos(">cos</button>
        <button class="calc-sci-btn" data-val="tan(">tan</button>
        <button class="calc-sci-btn" data-val="log(">log</button>
        <button class="calc-sci-btn" data-val="π" id="pi-btn">π</button>
      </div>

      <!-- Second Scientific Row -->
      <div class="calc-sci-row">
        <button class="calc-sci-btn" data-val="√(">√</button>
        <button class="calc-sci-btn" data-val="^">x<sup>y</sup></button>
        <button class="calc-sci-btn" data-val="(">(</button>
        <button class="calc-sci-btn" data-val=")">)</button>
        <button class="calc-sci-btn" data-val="e">e</button>
      </div>

      <!-- Main Grid -->
      <div class="calc-grid">
        <button class="calc-btn function" id="clear-btn">AC</button>
        <button class="calc-btn function">±</button>
        <button class="calc-btn function">%</button>
        <button class="calc-btn operator">÷</button>

        <button class="calc-btn">7</button>
        <button class="calc-btn">8</button>
        <button class="calc-btn">9</button>
        <button class="calc-btn operator">×</button>

        <button class="calc-btn">4</button>
        <button class="calc-btn">5</button>
        <button class="calc-btn">6</button>
        <button class="calc-btn operator">−</button>

        <button class="calc-btn">1</button>
        <button class="calc-btn">2</button>
        <button class="calc-btn">3</button>
        <button class="calc-btn operator">+</button>

        <button class="calc-btn zero">0</button>
        <button class="calc-btn">.</button>
        <button class="calc-btn equals" id="equals-btn">=</button>
      </div>

    </div>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
