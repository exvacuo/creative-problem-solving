<!DOCTYPE html>
<html style="background:#111113;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Calculator — Home Screen</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@9.0.3/framework7-bundle.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-bg-dark">

  <div class="phone-frame">
    <div class="dynamic-island"></div>

    <!-- Global Status Bar -->
    <div class="global-status-bar">
      <span>9:41</span>
      <div class="icons">
        <!-- Cellular -->
        <svg viewBox="0 0 18 12" style="width:16px; margin-right:1px;"><g fill="currentColor"><rect x="1" y="7" width="2.5" height="5" rx="1"/><rect x="5.5" y="4.5" width="2.5" height="7.5" rx="1"/><rect x="10" y="2" width="2.5" height="10" rx="1"/><rect x="14.5" y="0" width="2.5" height="12" rx="1"/></g></svg>
        <!-- Wi-Fi -->
        <svg viewBox="0 0 24 20" style="width:17px; margin-right:4px;"><path fill="currentColor" d="M12 19c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7.66-8.24c-4.23-3.6-11.09-3.6-15.32 0-.38.33-.42.91-.1 1.29.33.38.91.42 1.29.1 3.49-2.96 9.17-2.96 12.66 0 .38.33.95.28 1.29-.1.33-.38.28-.95-.1-1.29zm-3.83 4.09c-2.11-1.8-5.55-1.8-7.66 0-.38.33-.42.9-.1 1.29.33.38.91.42 1.29.1 1.74-1.48 4.59-1.48 6.33 0 .38.33.95.28 1.29-.1.32-.39.28-.96-.1-1.29zm7.66-8.19c-6.34-5.4-16.63-5.4-22.98 0-.38.33-.42.91-.1 1.29.33.38.91.42 1.29.1 5.23-4.45 13.75-4.45 18.98 0 .38.33.95.28 1.29-.1.33-.38.28-.95-.1-1.29z"/></svg>
        <!-- Battery -->
        <svg viewBox="0 0 25 12" style="width:23px; padding-bottom:1px;"><rect x="1" y="1" width="20" height="10" rx="3.5" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="3" y="3" width="13" height="6" rx="1.5" fill="currentColor"/><path d="M22 4.5h1a1.5 1.5 0 010 3h-1v-3z" fill="currentColor"/></svg>
      </div>
    </div>

    <div class="homescreen">



      <!-- App Grid -->
      <div class="hs-grid">
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/weather.png" alt="Weather">
          </div>
          <span class="hs-app-name">Weather</span>
        </div>
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/clock.png" alt="Clock">
          </div>
          <span class="hs-app-name">Clock</span>
        </div>
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/photos.png" alt="Photos">
          </div>
          <span class="hs-app-name">Photos</span>
        </div>
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/reminders.png" alt="Reminders">
          </div>
          <span class="hs-app-name">Reminders</span>
        </div>
        
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/appstore.png" alt="App Store">
          </div>
          <span class="hs-app-name">App Store</span>
        </div>
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/maps.png" alt="Maps">
          </div>
          <span class="hs-app-name">Maps</span>
        </div>
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/notes.png" alt="Notes">
          </div>
          <span class="hs-app-name">Notes</span>
        </div>
        
        <!-- Stealth Calculator App -->
        <a class="hs-app" href="calculator.html">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/calculator.png" alt="Calculator">
          </div>
          <span class="hs-app-name">Calculator</span>
        </a>

        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/settings.png" alt="Settings">
          </div>
          <span class="hs-app-name">Settings</span>
        </div>
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/music.png" alt="Music">
          </div>
          <span class="hs-app-name">Music</span>
        </div>
      </div>

      <!-- Page dots -->
      <div class="hs-dots"><span class="active"></span><span></span><span></span></div>

      <!-- Dock -->
      <div class="hs-dock">
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/facetime.png" alt="FaceTime">
          </div>
        </div>
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/safari.png" alt="Safari">
          </div>
        </div>
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/messages.png" alt="Messages">
            <span class="hs-badge" style="top:-3px; right:-3px; border-color: rgba(255,255,255,0.2);">12</span>
          </div>
        </div>
        <div class="hs-app">
          <div class="hs-icon-wrapper">
            <img class="hs-app-icon" src="../assets/ios-icons/mail.png" alt="Mail">
            <span class="hs-badge" style="top:-3px; right:-3px; border-color: rgba(255,255,255,0.2);">3</span>
          </div>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>

  <!-- ===== SWITCH TO WEB PROMO ===== -->
  <a href="../index.html" style="position: fixed; bottom: 24px; right: 24px; z-index: 100000; background: #1c1c1e; color: #fff; padding: 12px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; display: flex; align-items: center; gap: 8px; font-family: -apple-system, sans-serif; text-decoration: none;">
    <svg xmlns="http://www.w3.org/2000/svg" style="width:20px; height:20px; color: #ff9f0a;" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>
    <span style="font-size:14px; font-weight:600;">View Web Promo</span>
  </a>

</body>
</html>
