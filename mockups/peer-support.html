<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Calculator — Peer Support</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@9.0.3/framework7-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7-icons@5.0.5/css/framework7-icons.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-bg-dark">

  <div class="phone-frame">
    <div class="dynamic-island"></div>

    <!-- Global Status Bar -->
    <div class="global-status-bar">
      <span>9:41</span>
      <div class="icons">
        <svg viewBox="0 0 18 12" style="width:16px; margin-right:1px;"><g fill="currentColor"><rect x="1" y="7" width="2.5" height="5" rx="1"/><rect x="5.5" y="4.5" width="2.5" height="7.5" rx="1"/><rect x="10" y="2" width="2.5" height="10" rx="1"/><rect x="14.5" y="0" width="2.5" height="12" rx="1"/></g></svg>
        <svg viewBox="0 0 24 20" style="width:17px; margin-right:4px;"><path fill="currentColor" d="M12 19c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7.66-8.24c-4.23-3.6-11.09-3.6-15.32 0-.38.33-.42.91-.1 1.29.33.38.91.42 1.29.1 3.49-2.96 9.17-2.96 12.66 0 .38.33.95.28 1.29-.1.33-.38.28-.95-.1-1.29zm-3.83 4.09c-2.11-1.8-5.55-1.8-7.66 0-.38.33-.42.9-.1 1.29.33.38.91.42 1.29.1 1.74-1.48 4.59-1.48 6.33 0 .38.33.95.28 1.29-.1.32-.39.28-.96-.1-1.29zm7.66-8.19c-6.34-5.4-16.63-5.4-22.98 0-.38.33-.42.91-.1 1.29.33.38.91.42 1.29.1 5.23-4.45 13.75-4.45 18.98 0 .38.33.95.28 1.29-.1.33-.38.28-.95-.1-1.29z"/></svg>
        <svg viewBox="0 0 25 12" style="width:23px; padding-bottom:1px;"><rect x="1" y="1" width="20" height="10" rx="3.5" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="3" y="3" width="13" height="6" rx="1.5" fill="currentColor"/><path d="M22 4.5h1a1.5 1.5 0 010 3h-1v-3z" fill="currentColor"/></svg>
      </div>
    </div>

    <!-- Persistent Emergency Exit FAB -->
    <!-- Positioned higher so it doesn't overlap the chat input bar -->
    <a href="calculator.html" class="emergency-fab" style="bottom: 74px;">
      <i class="f7-icons">power</i> Exit
    </a>

    <div id="app">
      <div class="view view-main">
        <div data-name="peer-support" class="page dark-support">
          
          <div class="navbar">
            <div class="navbar-bg"></div>
            <div class="navbar-inner sliding">
              <div class="left">
                <a href="support.html" class="link" style="color:var(--safe-primary);">
                  <i class="f7-icons">chevron_left</i><span>Back</span>
                </a>
              </div>
              <div class="title" style="color:var(--safe-text);">Volunteer Chat</div>
            </div>
          </div>

          <!-- Message bar -->
          <div class="toolbar messagebar" style="background:#1c1c1e; border-top:1px solid #38383a;">
            <div class="toolbar-inner">
              <div class="messagebar-area">
                <textarea class="resizable" placeholder="Message..." style="color:#fff;"></textarea>
              </div>
              <a href="#" class="link send-link" style="color:var(--safe-primary);">Send</a>
            </div>
          </div>

          <!-- Messages wrapper -->
          <div class="page-content messages-content" style="background:var(--safe-bg);">
            <div class="messages">
              <div class="messages-title" style="color:var(--safe-text-dim);"><b>Today</b> 10:42 AM</div>
              
              <div class="message message-received message-first message-last message-tail">
                <div class="message-avatar" style="background-color: var(--safe-primary); display:flex; align-items:center; justify-content:center; color:#fff;">
                  <i class="f7-icons" style="font-size:16px;">heart_fill</i>
                </div>
                <div class="message-content">
                  <div class="message-name" style="color:var(--safe-text-dim);">Volunteer</div>
                  <div class="message-bubble" style="background:#2c2c2e; color:#fff;">
                    <div class="message-text">Hello, I'm here. You are safe. How can I assist you today?</div>
                  </div>
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/framework7@9.0.3/framework7-bundle.min.js"></script>
  <script>
    var app = new Framework7({ el: '#app', name: 'Calculator', theme: 'ios', dark: true });
    var $$ = Framework7.$;
    
    // Init Messages
    var messages = app.messages.create({
      el: '.messages',
      firstMessageRule: function (message, previousMessage, nextMessage) {
        if (message.isTitle) return false;
        if (!previousMessage || previousMessage.type !== message.type || previousMessage.name !== message.name) return true;
        return false;
      },
      lastMessageRule: function (message, previousMessage, nextMessage) {
        if (message.isTitle) return false;
        if (!nextMessage || nextMessage.type !== message.type || nextMessage.name !== message.name) return true;
        return false;
      },
      tailMessageRule: function (message, previousMessage, nextMessage) {
        if (message.isTitle) return false;
        if (!nextMessage || nextMessage.type !== message.type || nextMessage.name !== message.name) return true;
        return false;
      }
    });

    // Init Messagebar
    var messagebar = app.messagebar.create({
      el: '.messagebar'
    });

    // Handle Send Event
    $$('.send-link').on('click', function () {
      var text = messagebar.getValue().replace(/\n/g, '<br>').trim();
      if (!text.length) return;

      messagebar.clear();
      messagebar.focus();

      // Add user message
      messages.addMessage({
        text: text,
        type: 'sent',
      });

      // Simulate bot reply
      setTimeout(function () {
        messages.showTyping({
          header: 'Volunteer is typing',
          avatar: '<div class="message-avatar" style="background-color: var(--safe-primary); display:flex; align-items:center; justify-content:center; color:#fff;"><i class="f7-icons" style="font-size:16px;">heart_fill</i></div>'
        });

        setTimeout(function () {
          messages.addMessage({
            text: 'I understand. Take your time, I am listening.',
            type: 'received',
            name: 'Volunteer',
            avatar: '<div class="message-avatar" style="background-color: var(--safe-primary); display:flex; align-items:center; justify-content:center; color:#fff;"><i class="f7-icons" style="font-size:16px;">heart_fill</i></div>'
          });
          messages.hideTyping();
        }, 2000);
      }, 500);
    });
  </script>
</body>
</html>
